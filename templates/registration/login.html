{% extends "base.html" %}
{% load static %}
{% block title %}Login — Earth Consulters{% endblock %}
{% block auth_content %}
<div class="login-wrapper">
  <div class="login-card">
    <div class="text-center mb-4">
      <img src="{% static 'img/logo_alternativa.png' %}" alt="Earth Consulters" style="max-height:80px;width:auto">
      <h4 class="mt-2 fw-700" style="color:#0d2137">Earth Consulters</h4>
      <p class="text-muted small">Portal Administrativo — Acesso Restrito</p>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Utilizador</label>
        <input type="text" name="username" class="form-control" placeholder="username" autofocus
               style="border-radius:10px;padding:12px">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••"
               style="border-radius:10px;padding:12px">
      </div>
      {% if form.errors %}
      <div class="alert alert-danger">Credenciais inválidas. Tente novamente.</div>
      {% endif %}
      <button type="submit" class="btn btn-primary w-100 py-2" style="border-radius:10px;font-weight:600">
        Entrar <i class="bi bi-arrow-right ms-1"></i>
      </button>
    </form>
  </div>
</div>
{% endblock %}
